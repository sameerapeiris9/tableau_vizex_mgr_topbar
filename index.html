<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Managers Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

/* ════════════════════════════════
   ROOT
════════════════════════════════ */
:root{
  --red:#c8102e;
  --gold:#e6a817;
  --text:#102033;
  --soft:#6b7280;
  --border:#e6e8ec;
  --bg:#ffffff;
  --shadow:0 2px 10px rgba(0,0,0,.06);
  --font:'Outfit',sans-serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  font-family:var(--font);
}

/* ════════════════════════════════
   NAVBAR
════════════════════════════════ */
.navbar{
  width:100%;
  height:60px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:14px;
  position:relative;
  box-shadow:var(--shadow);
}

.navbar::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  background:linear-gradient(
    90deg,
    var(--red),
    #f13b54,
    var(--gold)
  );
}

/* LOGO */
.logo-wrap{
  display:flex;
  align-items:center;
  padding-right:14px;
  border-right:1px solid var(--border);
}

.logo{
  height:28px;
}

/* TITLE */
.title-wrap{
  display:flex;
  flex-direction:column;
  min-width:240px;
}

.title{
  font-size:15px;
  font-weight:700;
  color:var(--text);
}

.subtitle{
  font-size:10px;
  color:var(--soft);
  text-transform:uppercase;
  letter-spacing:.5px;
}

/* NAV */
.nav-links{
  display:flex;
  align-items:center;
  gap:6px;
}

.nav-btn{
  height:34px;
  border:none;
  background:none;
  padding:0 14px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  color:#4b5563;
  transition:.2s;
}

.nav-btn:hover{
  background:#f3f4f6;
}

.nav-btn.active{
  background:rgba(200,16,46,.1);
  color:var(--red);
}

/* FILTERS */
.filter-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  margin-left:10px;
}

.select{
  height:34px;
  min-width:180px;
  border:1px solid var(--border);
  border-radius:8px;
  padding:0 12px;
  font-family:var(--font);
  font-size:12px;
  outline:none;
  background:#fff;
}

.select:focus{
  border-color:var(--red);
}

/* SPACER */
.spacer{
  flex:1;
}

/* RIGHT */
.right-wrap{
  display:flex;
  align-items:center;
  gap:14px;
}

/* CLOCK */
.clock{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.clock-time{
  font-size:13px;
  font-weight:700;
  color:var(--text);
}

.clock-date{
  font-size:10px;
  color:var(--soft);
}

/* USER */
.user-chip{
  display:flex;
  align-items:center;
  gap:10px;
  padding:4px 12px 4px 4px;
  border:1px solid var(--border);
  border-radius:50px;
  background:#f8fafc;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
}

.user-info{
  display:flex;
  flex-direction:column;
}

.user-name{
  font-size:12px;
  font-weight:600;
  color:var(--text);
}

.user-branch{
  font-size:10px;
  color:var(--soft);
}

</style>

</head>

<body>

<nav class="navbar">

  <!-- LOGO -->
  <div class="logo-wrap">

    <img class="logo"
         src="https://www.combank.lk/assets/images/logo/newlogo.svg">

  </div>

  <!-- TITLE -->
  <div class="title-wrap">

    <div class="title">
      Managers Performance Dashboard
    </div>

    <div class="subtitle">
      Commercial Bank of Ceylon PLC
    </div>

  </div>

  <!-- NAVIGATION -->
  <div class="nav-links">

    <button class="nav-btn active">
      Overview
    </button>

    <button class="nav-btn">
      Rankings
    </button>

    <button class="nav-btn">
      Branches
    </button>

    <button class="nav-btn">
      Targets
    </button>

  </div>

  <!-- FILTERS -->
  <div class="filter-wrap">

    <select class="select"
            id="branchFilter">

      <option value="">
        Select Branch
      </option>

    </select>

    <select class="select"
            id="managerFilter">

      <option value="">
        Select Manager
      </option>

    </select>

  </div>

  <div class="spacer"></div>

  <!-- RIGHT -->
  <div class="right-wrap">

    <!-- CLOCK -->
    <div class="clock">

      <div class="clock-time"
           id="clockTime">

        --:--:--

      </div>

      <div class="clock-date"
           id="clockDate">

        ----

      </div>

    </div>

    <!-- USER -->
    <div class="user-chip">

      <div class="avatar"
           id="avatar">

        MP

      </div>

      <div class="user-info">

        <div class="user-name"
             id="managerName">

          Manager

        </div>

        <div class="user-branch"
             id="branchName">

          Branch

        </div>

      </div>

    </div>

  </div>

</nav>

<script>

/* ════════════════════════════════
   CONFIG
════════════════════════════════ */
const PARAM_MANAGER = "manager_name";
const PARAM_BRANCH  = "branch";

let dashboard;

/* ════════════════════════════════
   CLOCK
════════════════════════════════ */
function updateClock(){

  const now = new Date();

  document.getElementById("clockTime").innerText =
    now.toLocaleTimeString("en-GB");

  document.getElementById("clockDate").innerText =
    now.toLocaleDateString("en-GB",{
      weekday:"short",
      day:"2-digit",
      month:"short",
      year:"numeric"
    });

}

updateClock();

setInterval(updateClock,1000);

/* ════════════════════════════════
   INIT TABLEAU
════════════════════════════════ */
tableau.extensions.initializeAsync()

.then(async ()=>{

  dashboard =
    tableau.extensions.dashboardContent.dashboard;

  const worksheets =
    dashboard.worksheets;

  if(!worksheets.length){
    return;
  }

  const ws = worksheets[0];

  const data =
    await ws.getSummaryDataAsync();

  const columns =
    data.columns.map(c=>c.fieldName);

  const managerIndex =
    columns.findIndex(c=>
      c.toLowerCase().includes("manager")
    );

  const branchIndex =
    columns.findIndex(c=>
      c.toLowerCase().includes("branch")
    );

  const managers = new Set();
  const branches = new Set();

  data.data.forEach(r=>{

    if(managerIndex>-1){

      managers.add(
        r[managerIndex].formattedValue
      );

    }

    if(branchIndex>-1){

      branches.add(
        r[branchIndex].formattedValue
      );

    }

  });

  /* LOAD BRANCHES */
  const branchFilter =
    document.getElementById("branchFilter");

  [...branches]
    .sort()
    .forEach(v=>{

      const o =
        document.createElement("option");

      o.value=v;
      o.textContent=v;

      branchFilter.appendChild(o);

    });

  /* LOAD MANAGERS */
  const managerFilter =
    document.getElementById("managerFilter");

  [...managers]
    .sort()
    .forEach(v=>{

      const o =
        document.createElement("option");

      o.value=v;
      o.textContent=v;

      managerFilter.appendChild(o);

    });

});

/* ════════════════════════════════
   FILTER EVENTS
════════════════════════════════ */
document.getElementById("branchFilter")

.addEventListener("change",

async function(){

  const value = this.value;

  const params =
    await dashboard.getParametersAsync();

  const p =
    params.find(x=>x.name===PARAM_BRANCH);

  if(p){

    await p.changeValueAsync(
      value || "ALL"
    );

  }

  document.getElementById("branchName")
    .innerText = value || "All Branches";

});

/* MANAGER */
document.getElementById("managerFilter")

.addEventListener("change",

async function(){

  const value = this.value;

  const params =
    await dashboard.getParametersAsync();

  const p =
    params.find(x=>x.name===PARAM_MANAGER);

  if(p){

    await p.changeValueAsync(
      value || "ALL"
    );

  }

  document.getElementById("managerName")
    .innerText = value || "Manager";

  /* AVATAR */
  if(value){

    const initials =
      value
      .split(" ")
      .map(x=>x[0])
      .join("")
      .substring(0,2);

    document.getElementById("avatar")
      .innerText = initials;

  }

});

</script>

</body>
</html>
